<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الحساب معطل ومحظور مؤقتاً</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #000330; color: #fff; height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; text-align: center; }
        .block-card { background: #000675; border: 2px solid #ff3366; padding: 40px 30px; border-radius: 24px; max-width: 500px; box-shadow: 0 15px 40px rgba(255, 51, 102, 0.2); }
        .icon-area { font-size: 65px; color: #ff3366; margin-bottom: 20px; animation: pulse 2s infinite; }
        h1 { font-size: 24px; margin-bottom: 15px; color: #ff3366; font-weight: 800; }
        p { color: #a5a1ca; font-size: 15px; line-height: 1.6; margin-bottom: 25px; }
        .support-btn { display: inline-flex; align-items: center; gap: 10px; background: #00a4ff; color: #000; padding: 12px 30px; border-radius: 12px; font-weight: bold; text-decoration: none; font-size: 14px; }
        .support-btn:hover { background: #fff; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0, 164, 255, 0.4); }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="block-card">
        <div class="icon-area"><i class="fas fa-user-shield"></i></div>
        <h1>تم حظر حسابك!</h1>
        <p>تم حظرك بسبب سلوك سئ أو شبهة لمخالفة شروط وسياسات استخدام منصة 7lbsaa التعليمية.</p>
        <a href="https://www.facebook.com/61584178882412/" target="_blank" class="support-btn">
            <i class="fab fa-facebook"></i> تواصل مع الإدارة لتقديم طلب مراجعة
        </a>
    </div>

</body>
</html>
