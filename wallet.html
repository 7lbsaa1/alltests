<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شحن محفظة الرصيد | 7lbsaa</title>
    <style>
        body { background: #0f0c1b; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .wallet-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 35px; border-radius: 20px; text-align: center; width: 90%; max-width: 400px; }
        h2 { color: #00f2fe; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 25px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.4); color: #fff; text-align: center; font-size: 18px; }
        .pay-btn { width: 100%; padding: 14px; background: #25D366; border: none; border-radius: 10px; color: #fff; font-weight: bold; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .pay-btn:hover { box-shadow: 0 0 15px rgba(37, 211, 102, 0.4); }
    </style>
</head>
<body>
    <div class="wallet-box">
        <h2>شحن الرصيد للمحفظة</h2>
        <p style="color:#aaa; margin-bottom:15px; font-size:14px;">سيتم تحويل طلبك مباشرة للأدمن لتفعيل الرصيد</p>
        <input type="number" id="amount-input" placeholder="اكتب المبلغ المراد شحنه (ج.م)..." min="10">
        <button class="pay-btn" onclick="sendWhatsappPayment()"><i class="fab fa-whatsapp" style="font-size:20px;"></i> إرسال طلب الشحن عبر واتساب</button>
        <a href="index.html" style="display:inline-block; margin-top:20px; color:#aaa; text-decoration:none; font-size:13px;">إلغاء والعودة</a>
    </div>

    <script>
        let currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if(!currentUser) { window.location.href = 'login.html'; }

        function sendWhatsappPayment() {
            let amount = document.getElementById('amount-input').value.trim();
            if(!amount || amount <= 0) { alert('من فضلك اكتب مبلغ شحن صحيح وبشكل دقيق!'); return; }

            let targetPhone = "201274550579"; // رقم الواتس الخاص بك بالصيغة الدولية المباشرة للينك
            
            // تجهيز الرسالة التلقائية المطلوبة
            let message = `السلام عليكم، أريد شحن رصيد في منصة 7lbsaa.%0A%0Aالمبلغ المراد شحنه: ${amount} جنيه مصري.%0Aكود المستخدم الخاص بي هو: ${currentUser.userCode}`;
            
            // فتح رابط واتساب الرسمي المباشر وإرسال الرسالة تلقائياً
            let whatsappUrl = `https://api.whatsapp.com/send?phone=${targetPhone}&text=${message}`;
            window.open(whatsappUrl, '_blank');
        }
    </script>
</body>
</html>
