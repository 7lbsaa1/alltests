<div class="scratch-charge-section" style="margin-top: 25px; padding-top: 20px; border-top: 1px solid var(--card-border); text-align: right;">
    <h3 style="color: var(--primary); font-size: 15px; margin-bottom: 12px;"><i class="fas fa-ticket-alt"></i> شحن المحفظة بواسطة كارت كود</h3>
    <div style="display: flex; gap: 10px;">
        <input type="text" id="scratch-code-input" placeholder="أدخل كود الكارت هنا (مثال: 7L-XXXXXX)" style="flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--card-border); background: rgba(0,0,0,0.2); color: #fff; text-align: center; font-weight: bold; font-family: monospace;">
        <button onclick="redeemScratchCode()" style="padding: 0 20px; background: linear-gradient(135deg, var(--primary), #00b4db); border: none; color: #000; font-weight: bold; border-radius: 10px; cursor: pointer;">تفعيل الكود</button>
    </div>
</div>

<script>
    // ضف هذه الدالة داخل الـ <script> الخاص بصفحة wallet.html
    function redeemScratchCode() {
        let inputCode = document.getElementById('scratch-code-input').value.trim().toUpperCase();
        if(!inputCode) return alert('برجاء كتابة الكود أولاً');

        let userCode = localStorage.getItem('currentUserCode') || '7L-STUDENT';
        
        // التحقق من وجود الكارت وصلاحيته في الفايربيز
        database.ref('scratch_cards/' + inputCode).once('value', (snapshot) => {
            if(snapshot.exists()) {
                let cardData = snapshot.val();
                if(cardData.status === 'مستعمل') {
                    alert('عذراً، هذا الكود تم استخدامه من قبل!');
                } else {
                    let cardAmount = parseFloat(cardData.amount);
                    
                    // جلب رصيد الطالب الحالي لإضافة قيمة الكارت عليه
                    database.ref('users/' + userCode).once('value', (userSnap) => {
                        if(userSnap.exists()) {
                            let currentBalance = parseFloat(userSnap.val().balance) || 0;
                            let newBalance = currentBalance + cardAmount;
                            
                            // تحديث الرصيد وتعطيل الكارت وتسجيل العملية
                            database.ref('users/' + userCode).update({ balance: newBalance });
                            database.ref('scratch_cards/' + inputCode).update({ status: 'مستعمل', usedBy: userCode });
                            
                            database.ref('history').push({
                                studentCode: userCode,
                                studentName: userSnap.val().username,
                                amount: cardAmount,
                                type: 'شحن كارت كود',
                                date: new Date().toLocaleString('ar-EG')
                            });

                            alert(`مبروك! تم شحن محفظتك بنجاح بقيمة ${cardAmount} ج.م`);
                            document.getElementById('scratch-code-input').value = '';
                        }
                    });
                }
            } else {
                alert('الكود الذي أدخلته غير صحيح أو غير موجود بسيرفراتنا!');
            }
        });
    }
</script>
