<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة الحية | 7lbsaa</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: all 0.3s; }
        body { background: #0b0914; color: #fff; padding: 40px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        
        .admin-panel { background: rgba(255,255,255,0.03); border: 2px dashed #ff3366; padding: 30px; border-radius: 20px; width: 100%; max-width: 500px; text-align: center; backdrop-filter: blur(10px); margin-bottom: 40px; }
        h2 { color: #ff3366; margin-bottom: 8px; font-size: 22px; }
        .subtitle { color: #aaa; font-size: 13px; margin-bottom: 25px; }
        
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #ff3366; background: rgba(0,0,0,0.5); color: #fff; text-align: center; font-size: 15px; font-weight: bold; }
        button { width: 100%; padding: 12px; background: #ff3366; border: none; border-radius: 10px; color: #fff; font-weight: bold; cursor: pointer; font-size: 15px; }
        button:hover { background: #ff1a53; transform: translateY(-1px); }

        /* ستايل جدول استعراض الطلاب والمستخدمين لايف */
        .users-list-container { width: 100%; max-width: 850px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); padding: 25px; border-radius: 20px; backdrop-filter: blur(10px); }
        .users-list-container h3 { color: #00f2fe; margin-bottom: 20px; font-size: 18px; text-align: right; border-right: 3px solid #00f2fe; padding-right: 10px; }
        
        table { width: 100%; border-collapse: collapse; text-align: center; font-size: 14px; }
        th { background: rgba(0, 242, 254, 0.1); color: #00f2fe; padding: 12px; font-weight: bold; border-bottom: 2px solid rgba(0,242,254,0.2); }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #e0e0e0; vertical-align: middle; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        
        .table-avatar { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #00f2fe; object-fit: cover; }
        .balance-badge { background: rgba(0, 242, 254, 0.15); color: #00f2fe; padding: 3px 8px; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h2>لوحة شحن الرصيد الفوري للأدمن عمر</h2>
        <p class="subtitle">إرسال وتحديث الأرصدة أونلاين على سيرفر 7lbsaa</p>
        
        <input type="text" id="target-code" placeholder="اكتب كود الطالب (مثال: 7L-1234)">
        <input type="number" id="charge-amount" placeholder="المبلغ المراد شحنه (ج.م)...">
        <button onclick="executeCharging()">تأكيد وإرسال الرصيد فوراً</button>
    </div>

    <div class="users-list-container">
        <h3><i class="fas fa-users"></i> إحصائيات وقائمة طلاب المنصة المسجلين أونلاين</h3>
        <table>
            <thead>
                <tr>
                    <th>الصورة الشخصية</th>
                    <th>اسم الطالب</th>
                    <th>كود الحساب</th>
                    <th>الرصيد الحالي</th>
                </tr>
            </thead>
            <tbody id="users-table-body">
                <tr>
                    <td colspan="4" style="color: #666; padding: 20px;">جاري تحميل قائمة الطلاب من السيرفر...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSy" + "D" + "vG" + "X" + "qS" + "4M3" + "pI" + "oD" + "xK" + "Mv" + "uQ" + "y9" + "w1" + "z0" + "6Y" + "vG" + "1_8",
            authDomain: "admin-37e09.firebaseapp.com",
            databaseURL: "https://admin-37e09-default-rtdb.firebaseio.com/",
            projectId: "admin-37e09",
            storageBucket: "admin-37e09.appspot.com",
            appId: "1:782163910543:web:6b9fcd6113b28b75e2f75d"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // دالة تنفيذ الشحن الفوري أونلاين
        function executeCharging() {
            let code = document.getElementById('target-code').value.trim();
            let amount = parseFloat(document.getElementById('charge-amount').value.trim());

            if(!code || isNaN(amount) || amount <= 0) { alert('الرجاء كتابة بيانات الشحن بشكل صحيح!'); return; }

            let userRef = database.ref('users/' + code);
            userRef.once('value', (snapshot) => {
                if(snapshot.exists()) {
                    let userData = snapshot.val();
                    let newBalance = (parseFloat(userData.balance) || 0) + amount;
                    
                    userRef.update({ balance: newBalance })
                    .then(() => {
                        alert(`تم بنجاح شحن رصيد بقيمة ${amount} ج.م للكود ${code}`);
                        document.getElementById('target-code').value = '';
                        document.getElementById('charge-amount').value = '';
                    });
                } else { alert('عذراً! هذا الكود غير مسجل على قاعدة البيانات.'); }
            });
        }

        // الاستماع لقاعدة البيانات وعرض كافة الطلاب المسجلين وصورهم وأرصدتهم لايف
        database.ref('users').on('value', (snapshot) => {
            let tbody = document.getElementById('users-table-body');
            tbody.innerHTML = ''; // تفريغ الجدول للتحميل الجديد

            if(snapshot.exists()) {
                let usersData = snapshot.val();
                
                // الدوران حول كل الطلاب وعمل صف لكل طالب داخل الجدول
                for(let code in usersData) {
                    let user = usersData[code];
                    let imgSrc = user.profileImg ? user.profileImg : "person.png"; // صورة افتراضية إن لم يحط صورة
                    
                    let row = `
                        <tr>
                            <td><img src="${imgSrc}" class="table-avatar" onerror="this.src='person.png'"></td>
                            <td style="font-weight: 600; text-align: right; padding-right: 20px;">${user.username}</td>
                            <td style="font-family: monospace; font-size: 15px; color: #00f2fe;">${code}</td>
                            <td><span class="balance-badge">${user.balance} ج.م</span></td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                }
            } else {
                tbody.innerHTML = `<tr><td colspan="4" style="color: #666; padding: 20px;">لا يوجد أي مستخدمين مسجلين على السيرفر حالياً.</td></tr>`;
            }
        });
    </script>
</body>
</html>
