<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الإدارة | 7lbsaa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: all 0.3s; }
        body { background: #0b0914; color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; margin: 0; }
        
        /* حاوية لوحة التحكم الرئيسية */
        .dashboard-wrapper { display: flex; width: 100%; max-width: 900px; flex-direction: column; align-items: center; gap: 30px; }
        
        .admin-grid { display: flex; flex-wrap: wrap; gap: 20px; width: 100%; justify-content: center; }
        
        .admin-panel { background: rgba(255, 255, 255, 0.03); border: 2px dashed #ff3366; padding: 30px; border-radius: 20px; flex: 1; min-width: 300px; text-align: center; backdrop-filter: blur(10px); }
        .admin-panel h2 { color: #ff3366; margin-bottom: 8px; font-size: 22px; }
        .subtitle { color: #aaa; font-size: 13px; margin-bottom: 25px; }
        
        .dash-input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #ff3366; background: rgba(0,0,0,0.5); color: #fff; text-align: center; font-size: 15px; font-weight: bold; }
        .dash-btn { width: 100%; padding: 12px; background: #ff3366; border: none; border-radius: 10px; color: #fff; font-weight: bold; cursor: pointer; font-size: 15px; }
        .dash-btn:hover { background: #ff1a53; transform: translateY(-1px); }

        .section-container { width: 100%; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); padding: 25px; border-radius: 20px; backdrop-filter: blur(10px); }
        .section-container h3 { color: #00f2fe; margin-bottom: 20px; font-size: 18px; text-align: right; border-right: 3px solid #00f2fe; padding-right: 10px; }
        
        /* ستايل الشات المباشر داخل الأدمن */
        .chat-box { max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 10px; border-radius: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); }
        .chat-message { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; border-right: 4px solid #22c55e; display: flex; flex-direction: column; gap: 5px; text-align: right; }
        .chat-meta { font-size: 12px; color: #00f2fe; font-weight: bold; display: flex; justify-content: space-between; }
        .chat-text { font-size: 14px; color: #fff; line-height: 1.4; }

        table { width: 100%; border-collapse: collapse; text-align: center; font-size: 14px; }
        th { background: rgba(0, 242, 254, 0.1); color: #00f2fe; padding: 12px; font-weight: bold; border-bottom: 2px solid rgba(0,242,254,0.2); }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #e0e0e0; vertical-align: middle; }
        .table-avatar { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #00f2fe; object-fit: cover; }
        .balance-badge { background: rgba(0, 242, 254, 0.15); color: #00f2fe; padding: 3px 8px; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="dashboard-wrapper">
        <div class="admin-grid">
            <div class="admin-panel">
                <h2>لوحة شحن الرصيد الفوري للأدمن عمر</h2>
                <p class="subtitle">إرسال وتحديث الأرصدة أونلاين على سيرفر 7lbsaa</p>
                <input type="text" id="target-code" class="dash-input" placeholder="اكتب كود الطالب (مثال: 7L-1234)">
                <input type="number" id="charge-amount-input" class="dash-input" placeholder="المبلغ المراد شحنه (ج.م)...">
                <button class="dash-btn" onclick="executeCharging()">تأكيد وإرسال الرصيد فوراً</button>
            </div>
        </div>

        <div class="section-container">
            <h3><i class="fas fa-comments"></i> مركز الدعم والشات المباشر (رسائل الطلاب الحالية)</h3>
            <div class="chat-box" id="admin-chat-box">
                <div style="color: #666; text-align: center; padding: 20px;">في انتظار استقبال رسائل جديدة من الطلاب...</div>
            </div>
        </div>

        <div class="section-container">
            <h3><i class="fas fa-users"></i> قائمة طلاب المنصة المسجلين أونلاين</h3>
            <table>
                <thead>
                    <tr>
                        <th>الصورة الشخصية</th>
                        <th>اسم الطالب</th>
                        <th>كود الحساب</th>
                        <th>الرصيد الحالي</th>
                    </tr>
                </thead>
                <tbody id="users-table-body">
                    <tr>
                        <td colspan="4" style="color: #666; padding: 20px;">جاري الاتصال الآمن بالسيرفر...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        // بدء الاتصال بالسيرفر تلقائياً فور فتح الصفحة
        window.onload = function() {
            initializeFirebaseConnection();
        };

        let database;
        function initializeFirebaseConnection() {
            const firebaseConfig = {
                apiKey: "AIzaSy" + "D" + "vG" + "X" + "qS" + "4M3" + "pI" + "oD" + "xK" + "Mv" + "uQ" + "y9" + "w1" + "z0" + "6Y" + "vG" + "1_8",
                authDomain: "admin-37e09.firebaseapp.com",
                databaseURL: "https://admin-37e09-default-rtdb.firebaseio.com/",
                projectId: "admin-37e09",
                storageBucket: "admin-37e09.appspot.com",
                appId: "1:782163910543:web:6b9fcd6113b28b75e2f75d"
            };
            
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            database = firebase.database();

            // 1. جلب بيانات الطلاب أونلاين لايف
            database.ref('users').on('value', (snapshot) => {
                let tbody = document.getElementById('users-table-body');
                tbody.innerHTML = '';
                if(snapshot.exists()) {
                    let usersData = snapshot.val();
                    for(let code in usersData) {
                        let user = usersData[code];
                        let imgSrc = user.profileImg ? user.profileImg : "person.png";
                        let row = `<tr>
                            <td><img src="${imgSrc}" class="table-avatar" onerror="this.src='person.png'"></td>
                            <td style="font-weight: 600; text-align: right; padding-right: 20px;">${user.username}</td>
                            <td style="font-family: monospace; font-size: 15px; color: #00f2fe;">${code}</td>
                            <td><span class="balance-badge">${user.balance} ج.م</span></td>
                        </tr>`;
                        tbody.innerHTML += row;
                    }
                } else {
                    tbody.innerHTML = `<tr><td colspan="4" style="color: #666; padding: 20px;">لا يوجد مستخدمين مسجلين حالياً.</td></tr>`;
                }
            });

            // 2. جلب رسائل الشات المباشر لايف من الطلاب
            database.ref('live_chats').on('value', (snapshot) => {
                let chatBox = document.getElementById('admin-chat-box');
                chatBox.innerHTML = '';
                if(snapshot.exists()) {
                    let chats = snapshot.val();
                    for(let id in chats) {
                        let msg = chats[id];
                        let chatRow = `
                            <div class="chat-message">
                                <div class="chat-meta">
                                    <span><i class="fas fa-user"></i> كود الطالب: ${msg.userCode}</span>
                                    <span>${msg.time || ''}</span>
                                </div>
                                <div class="chat-text">${msg.text}</div>
                            </div>
                        `;
                        chatBox.innerHTML += chatRow;
                    }
                    chatBox.scrollTop = chatBox.scrollHeight;
                } else {
                    chatBox.innerHTML = `<div style="color: #666; text-align: center; padding: 20px;">لا توجد رسائل دعم حالياً.</div>`;
                }
            });
        }

        // دالة تنفيذ الشحن السريع
        function executeCharging() {
            let code = document.getElementById('target-code').value.trim();
            let amount = parseFloat(document.getElementById('charge-amount-input').value.trim());

            if(!code || isNaN(amount) || amount <= 0) { alert('الرجاء كتابة البيانات بشكل صحيح!'); return; }

            let userRef = database.ref('users/' + code);
            userRef.once('value', (snapshot) => {
                if(snapshot.exists()) {
                    let userData = snapshot.val();
                    let newBalance = (parseFloat(userData.balance) || 0) + amount;
                    userRef.update({ balance: newBalance })
                    .then(() => {
                        alert(`تم بنجاح شحن رصيد بقيمة ${amount} ج.م للكود ${code}`);
                        document.getElementById('target-code').value = '';
                        document.getElementById('charge-amount-input').value = '';
                    });
                } else { alert('عذراً! هذا الكود غير مسجل.'); }
            });
        }
    </script>
</body>
</html>
