<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة الكاملة | 7lbsaa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: all 0.3s; }
        body { background: #0b0914; color: #fff; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; gap: 25px; }
        .dashboard-wrapper { width: 100%; max-width: 1000px; display: flex; flex-direction: column; gap: 25px; }
        
        .admin-panel { background: rgba(255, 255, 255, 0.03); border: 2px dashed #ff3366; padding: 25px; border-radius: 20px; text-align: center; backdrop-filter: blur(10px); }
        .admin-panel h2 { color: #ff3366; font-size: 22px; margin-bottom: 15px; }
        .dash-input { width: 100%; max-width: 300px; padding: 12px; margin: 5px; border-radius: 10px; border: 1px solid #ff3366; background: #000; color: #fff; text-align: center; font-weight: bold; }
        .dash-btn { padding: 12px 25px; background: #ff3366; border: none; border-radius: 10px; color: #fff; font-weight: bold; cursor: pointer; }

        .section-container { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); padding: 20px; border-radius: 20px; backdrop-filter: blur(10px); }
        .section-container h3 { color: #00f2fe; margin-bottom: 15px; border-right: 3px solid #00f2fe; padding-right: 10px; font-size: 18px; text-align: right; }

        /* تقسيم واجهة الشات التفاعلية داخل الأدمن */
        .chat-system-grid { display: flex; gap: 20px; height: 350px; }
        .students-chat-list { width: 30%; background: rgba(0,0,0,0.3); border-radius: 12px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.05); padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .student-tab { padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; text-align: right; cursor: pointer; font-size: 13px; border-right: 3px solid #666; }
        .student-tab.active { background: rgba(0,242,254,0.1); border-color: #00f2fe; color: #00f2fe; font-weight: bold; }
        
        .chat-window-area { width: 70%; background: rgba(0,0,0,0.2); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; overflow: hidden; }
        .chat-messages-display { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        .adm-msg-in { background: rgba(0, 242, 254, 0.1); padding: 8px 12px; border-radius: 12px 12px 0 12px; align-self: flex-start; max-width: 80%; text-align: right; font-size: 13px; }
        .adm-msg-out { background: rgba(255, 51, 102, 0.1); padding: 8px 12px; border-radius: 12px 12px 12px 0; align-self: flex-end; max-width: 80%; text-align: right; font-size: 13px; }
        
        .chat-reply-form { padding: 10px; background: rgba(0,0,0,0.4); display: flex; gap: 8px; border-top: 1px solid rgba(255,255,255,0.05); }
        .reply-input { flex: 1; padding: 10px; background: #000; border: 1px solid #00f2fe; border-radius: 8px; color: #fff; }
        .reply-btn { padding: 10px 20px; background: #00f2fe; border: none; color: #000; font-weight: bold; border-radius: 8px; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; text-align: center; font-size: 14px; }
        th { background: rgba(0, 242, 254, 0.1); color: #00f2fe; padding: 12px; border-bottom: 2px solid rgba(0,242,254,0.2); }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #e0e0e0; }
        .balance-badge { background: rgba(0, 242, 254, 0.15); color: #00f2fe; padding: 3px 8px; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="dashboard-wrapper">
        <div class="admin-panel">
            <h2>لوحة شحن الرصيد الفوري للأدمن عمر</h2>
            <input type="text" id="target-code" class="dash-input" placeholder="كود الطالب">
            <input type="number" id="charge-amount-input" class="dash-input" placeholder="المبلغ المراد شحنه (ج.م)">
            <button class="dash-btn" onclick="executeCharging()">تأكيد الشحن الفوري</button>
        </div>

        <div class="section-container">
            <h3><i class="fas fa-comments"></i> مركز دعم الطلاب والرد المباشر لايف</h3>
            <div class="chat-system-grid">
                <div class="students-chat-list" id="students-list-ui">
                    <div style="color:#555; text-align:center; font-size:12px; padding:20px;">لا يوجد محادثات نشطة.</div>
                </div>
                <div class="chat-window-area">
                    <div class="chat-messages-display" id="admin-messages-box">
                        <div style="color:#555; text-align:center; padding:50px;">اختر طالب من القائمة الجانبية لبدء الشات والرد عليه</div>
                    </div>
                    <div class="chat-reply-form">
                        <input type="text" id="admin-reply-input" class="reply-input" placeholder="اكتب رد الأدمن هنا..." onkeypress="handleReplyKeyPress(event)">
                        <button class="reply-btn" onclick="sendAdminReply()">إرسال الرد</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="section-container">
            <h3><i class="fas fa-users"></i> قائمة طلاب المنصة المسجلين</h3>
            <table>
                <thead>
                    <tr><th>اسم الطالب</th><th>كود الحساب</th><th>الرصيد الحالي</th></tr>
                </thead>
                <tbody id="users-table-body">
                    <tr><td colspan="3" style="color: #666; padding: 20px;">جاري الاتصال بالسيرفر...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSy" + "D" + "vG" + "X" + "qS" + "4M3" + "pI" + "oD" + "xK" + "Mv" + "uQ" + "y9" + "w1" + "z0" + "6Y" + "vG" + "1_8",
            authDomain: "admin-37e09.firebaseapp.com",
            databaseURL: "https://admin-37e09-default-rtdb.firebaseio.com/",
            projectId: "admin-37e09",
            storageBucket: "admin-37e09.appspot.com",
            appId: "1:782163910543:web:6b9fcd6113b28b75e2f75d"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let selectedStudentCode = '';

        window.onload = function() {
            // جلب قائمة الطلاب
            database.ref('users').on('value', (snapshot) => {
                let tbody = document.getElementById('users-table-body');
                tbody.innerHTML = '';
                if(snapshot.exists()) {
                    snapshot.forEach((child) => {
                        let user = child.val();
                        tbody.innerHTML += `<tr>
                            <td style="font-weight:600;">${user.username}</td>
                            <td style="color:#00f2fe; font-family:monospace;">${child.key}</td>
                            <td><span class="balance-badge">${user.balance} ج.م</span></td>
                        </tr>`;
                    });
                }
            });

            // مراقبة جميع غرف الشات المفتوحة من الطلاب لايف
            database.ref('chats').on('value', (snapshot) => {
                let listUi = document.getElementById('students-list-ui');
                listUi.innerHTML = '';
                if(snapshot.exists()) {
                    snapshot.forEach((child) => {
                        let studentCode = child.key;
                        let activeClass = studentCode === selectedStudentCode ? 'active' : '';
                        listUi.innerHTML += `<div class="student-tab ${activeClass}" onclick="openStudentChat('${studentCode}')"><i class="fas fa-user-graduate"></i> طالب: ${studentCode}</div>`;
                    });
                } else {
                    listUi.innerHTML = `<div style="color:#555; text-align:center; font-size:12px; padding:20px;">لا يوجد شات حالي</div>`;
                }
            });
        };

        // فتح محادثة طالب معين والاتصال بها لايف
        function openStudentChat(studentCode) {
            selectedStudentCode = studentCode;
            
            // تحديث تصميم التابات النشطة
            let tabs = document.querySelectorAll('.student-tab');
            tabs.forEach(t => t.classList.remove('active'));
            
            database.ref('chats/' + studentCode).on('value', (snapshot) => {
                let msgBox = document.getElementById('admin-messages-box');
                msgBox.innerHTML = '';
                if(snapshot.exists()) {
                    snapshot.forEach((child) => {
                        let msg = child.val();
                        let msgClass = msg.sender === 'student' ? 'adm-msg-in' : 'adm-msg-out';
                        msgBox.innerHTML += `<div class="${msgClass}"><b>${msg.sender === 'student' ? 'الطالب' : 'أنا'}:</b> ${msg.text}</div>`;
                    });
                    msgBox.scrollTop = msgBox.scrollHeight;
                }
            });
        }

        // إرسال رد الأدمن إلى الطالب المحدد
        function sendAdminReply() {
            let input = document.getElementById('admin-reply-input');
            let text = input.value.trim();
            if (!text || !selectedStudentCode) return;

            database.ref('chats/' + selectedStudentCode).push({
                sender: 'admin',
                text: text,
                time: new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' })
            });
            input.value = '';
        }

        function executeCharging() {
            let code = document.getElementById('target-code').value.trim();
            let amount = parseFloat(document.getElementById('charge-amount-input').value.trim());
            if(!code || isNaN(amount)) return;
            database.ref('users/' + code).once('value', (s) => {
                if(s.exists()) {
                    let b = (parseFloat(s.val().balance) || 0) + amount;
                    database.ref('users/' + code).update({ balance: b }).then(() => alert('تم الشحن'));
                }
            });
        }

        function handleReplyKeyPress(e) { if(e.key === 'Enter') sendAdminReply(); }
    </script>
</body>
</html>
