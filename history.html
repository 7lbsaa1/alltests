<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأرشيف وسجل العمليات المالية | 7lbsaa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #000330; color: #fff; padding: 25px; }
        .container { max-width: 900px; margin: 0 auto; }
        h2 { color: #00a4ff; margin-bottom: 20px; font-size: 22px; }
        .log-box { background: #000675; border-radius: 16px; border: 1px solid rgba(0, 164, 255, 0.2); padding: 15px; display: flex; flex-direction: column; gap: 10px; max-height: 80vh; overflow-y: auto; }
        .log-item { background: #00021a; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-right: 4px solid #00a4ff; font-size: 14px; }
        .log-item.buy { border-right-color: #ff3366; }
    </style>
</head>
<body>
    <div class="container">
        <h2><i class="fas fa-history"></i> سجل الحسابات المالي وأرشيف الحركة لايف</h2>
        <div class="log-box" id="logs-container">لا يوجد عمليات مسجلة حتى الآن في السيرفر.</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://admin-37e09-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('history').on('value', (snapshot) => {
            let container = document.getElementById('logs-container');
            container.innerHTML = '';
            if(snapshot.exists()) {
                snapshot.forEach((child) => {
                    let log = child.val();
                    let cls = log.type === 'شراء' ? 'buy' : '';
                    container.innerHTML += `<div class="log-item ${cls}">
                        <div>
                            <span style="color:#00a4ff; font-weight:bold;">[${log.type}]</span> 
                            قام الأدمن بشحن حساب الطالب: <b>${log.studentName}</b> (${log.studentCode})
                        </div>
                        <div style="text-align:left;">
                            <div style="font-weight:bold; color:#22c55e;">+ ${log.amount} ج.م</div>
                            <small style="color:#555;">${log.date}</small>
                        </div>
                    </div>`;
                });
            } else {
                container.innerHTML = `<div style="color:#555; text-align:center; padding:40px;">السجل نظيف ومفيش حركات مالية.</div>`;
            }
        });
    </script>
</body>
</html>
