<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | 7lbsaa</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: all 0.3s; }
        body { background: #0f0c1b; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 400px; text-align: center; backdrop-filter: blur(10px); }
        h2 { margin-bottom: 25px; color: #00f2fe; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: #fff; font-size: 16px; text-align: center; }
        button { width: 100%; padding: 12px; background: #00f2fe; border: none; border-radius: 10px; color: #000; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { box-shadow: 0 0 15px rgba(0,242,254,0.4); }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>إنشاء ملف شخصي للمنصة</h2>
        <input type="text" id="username-input" placeholder="اكتب اسمك بالكامل هنا..." required>
        <button onclick="handleLogin()">دخول وإنشاء الحساب أونلاين</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        // الكوفتيج المظبوط لمشروعك الحالي admin-37e09
        const firebaseConfig = {
            apiKey: "AIzaSy" + "D" + "vG" + "X" + "qS" + "4M3" + "pI" + "oD" + "xK" + "Mv" + "uQ" + "y9" + "w1" + "z0" + "6Y" + "vG" + "1_8",
            authDomain: "admin-37e09.firebaseapp.com",
            databaseURL: "https://admin-37e09-default-rtdb.firebaseio.com/",
            projectId: "admin-37e09",
            storageBucket: "admin-37e09.appspot.com",
            appId: "1:782163910543:web:6b9fcd6113b28b75e2f75d"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function handleLogin() {
            let name = document.getElementById('username-input').value.trim();
            if(!name) { alert('من فضلك اكتب اسمك أولاً!'); return; }
            
            // توليد كود مستخدم فريد وعشوائي
            let generatedCode = '7L-' + Math.floor(1000 + Math.random() * 9000);
            let userObj = { username: name, userCode: generatedCode, balance: 0, purchasedVideos: ["none"] };

            // رفع الحساب على السيرفر فوراً
            database.ref('users/' + generatedCode).set(userObj)
            .then(() => {
                localStorage.setItem('currentUserCode', generatedCode);
                alert('تم إنشاء ملفك أونلاين بنجاح! كودك هو: ' + generatedCode);
                window.location.href = 'index.html'; // هينقلك للرئيسية
            }).catch(e => {
                console.error(e);
                alert('خطأ في الاتصال بالسيرفر، تأكد من تفعيل الـ Rules إلى true');
            });
        }
    </script>
</body>
</html>
