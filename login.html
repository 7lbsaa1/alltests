<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | 7lbsaa</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #0f0c1b; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { margin-bottom: 25px; color: #00f2fe; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: #fff; font-size: 16px; text-align: center; }
        button { width: 100%; padding: 12px; background: #00f2fe; border: none; border-radius: 10px; color: #000; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { box-shadow: 0 0 15px rgba(0,242,254,0.4); }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>إنشاء ملف شخصي للمنصة</h2>
        <input type="text" id="username-input" placeholder="اكتب اسمك بالكامل هنا..." required>
        <button onclick="handleLogin()">دخول وإنشاء الحساب</button>
    </div>

    <script>
        function handleLogin() {
            let name = document.getElementById('username-input').value.trim();
            if(!name) { alert('من فضلك اكتب اسمك أولاً!'); return; }
            
            // إنشاء كود مستخدم خاص وفريد عشوائي (مثال: 7L-4829)
            let generatedCode = '7L-' + Math.floor(1000 + Math.random() * 9000);
            
            let userObj = {
                username: name,
                userCode: generatedCode,
                balance: 0, // الرصيد الافتراضي البدائي
                purchasedVideos: []
            };

            // حفظ المستخدم الحالي
            localStorage.setItem('currentUser', JSON.stringify(userObj));

            // حفظه في قائمة المستخدمين الكلية للأدمن
            let usersList = JSON.parse(localStorage.getItem('usersList')) || [];
            usersList.push(userObj);
            localStorage.setItem('usersList', JSON.stringify(usersList));

            alert('تم إنشاء ملفك الشخصي بنجاح! كود المستخدم الخاص بك هو: ' + generatedCode);
            window.location.href = 'index.html'; // الدخول للصفحة الرئيسية فوراً
        }
    </script>
</body>
</html>
