<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي | 7lbsaa</title>
    <style>
        body { background: #0f0c1b; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .profile-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 40px; border-radius: 20px; text-align: center; width: 90%; max-width: 450px; }
        img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #00f2fe; margin-bottom: 20px; }
        h2 { color: #00f2fe; margin-bottom: 10px; }
        .info-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin: 15px 0; font-size: 18px; border-left: 4px solid #00f2fe; text-align: right; }
        .back-btn { display: inline-block; margin-top: 20px; color: #aaa; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="profile-card">
        <img src="logox.jpg" alt="Avatar">
        <h2 id="p-name">جاري التحميل...</h2>
        <div class="info-box"><strong>كود المستخدم الخاص بك:</strong> <span id="p-code" style="color:#00f2fe; font-weight:bold;"></span></div>
        <div class="info-box"><strong>رصيد المحفظة الحالي:</strong> <span id="p-balance"></span> جنيه</div>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i> العودة للمكتبة الرئيسية</a>
    </div>
    <script>
        let currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if(!currentUser) { window.location.href = 'login.html'; }
        document.getElementById('p-name').innerText = currentUser.username;
        document.getElementById('p-code').innerText = currentUser.userCode;
        document.getElementById('p-balance').innerText = currentUser.balance;
    </script>
</body>
</html>
