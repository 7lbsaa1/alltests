<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي | 7lbsaa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: all 0.3s ease; }
        body { background: #0f0c1b; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .profile-container { background: rgba(255,255,255,0.04); border: 1px solid rgba(0,242,254,0.15); padding: 40px; border-radius: 24px; width: 90%; max-width: 450px; text-align: center; backdrop-filter: blur(15px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        .avatar-wrapper { position: relative; width: 120px; height: 120px; margin: 0 auto 20px; cursor: pointer; }
        .profile-img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #00f2fe; object-fit: cover; box-shadow: 0 0 20px rgba(0,242,254,0.3); }
        
        /* تأثير مميز عند تمرير الماوس لاختيار صورة */
        .avatar-hint { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 12px; color: #00f2fe; opacity: 0; transition: opacity 0.3s; }
        .avatar-wrapper:hover .avatar-hint { opacity: 1; }

        h2 { font-size: 22px; margin-bottom: 5px; color: #fff; }
        .user-code-badge { display: inline-block; background: rgba(0,242,254,0.1); border: 1px solid #00f2fe; color: #00f2fe; padding: 4px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; margin-bottom: 25px; }
        
        .info-card { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); padding: 15px; border-radius: 14px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .info-card img { width: 30px; height: 30px; object-fit: contain; }
        .info-left { display: flex; align-items: center; gap: 12px; }
        .balance-value { font-size: 18px; font-weight: bold; color: #00f2fe; }
        
        .edit-section { margin-top: 15px; }
        /* إخفاء زرار الرفع الافتراضي الشين وعمل زرار فخم بديل */
        #file-input { display: none; }
        .upload-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #00f2fe, #4facfe); border: none; border-radius: 12px; color: #000; font-weight: bold; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 15px rgba(0,242,254,0.2); }
        .upload-btn:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 6px 20px rgba(0,242,254,0.4); }
        
        .back-link { display: inline-block; margin-top: 25px; color: #aaa; text-decoration: none; font-size: 14px; }
        .back-link:hover { color: #00f2fe; }
    </style>
</head>
<body>

    <div class="profile-container">
        <div class="avatar-wrapper" onclick="triggerFileInput()">
            <img id="user-image" src="person.png" class="profile-img" alt="صورة المستخدم">
            <div class="avatar-hint">
                <i class="fas fa-camera font-size: 18px; margin-bottom: 4px;"></i>
                <span>تغيير الصورة</span>
            </div>
        </div>
        
        <h2 id="user-name">تحميل الاسم...</h2>
        <div id="user-code" class="user-code-badge">7L-XXXX</div>
        
        <div class="info-card">
            <div class="info-left">
                <img src="money.png" alt="Money">
                <span>الرصيد الحالي بالمحفظة</span>
            </div>
            <span class="balance-value"><span id="user-balance">0</span> ج.م</span>
        </div>

        <div class="edit-section">
            <input type="file" id="file-input" accept="image/*" onchange="handleFileSelect(event)">
            <button class="upload-btn" onclick="triggerFileInput()">
                <i class="fas fa-upload"></i> اختر صورة من هاتفك الآن
            </button>
        </div>

        <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للمكتبة الرئيسية</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSy" + "D" + "vG" + "X" + "qS" + "4M3" + "pI" + "oD" + "xK" + "Mv" + "uQ" + "y9" + "w1" + "z0" + "6Y" + "vG" + "1_8",
            authDomain: "admin-37e09.firebaseapp.com",
            databaseURL: "https://admin-37e09-default-rtdb.firebaseio.com/",
            projectId: "admin-37e09",
            storageBucket: "admin-37e09.appspot.com",
            appId: "1:782163910543:web:6b9fcd6113b28b75e2f75d"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let userCode = localStorage.getItem('currentUserCode');
        if(!userCode) { window.location.href = 'login.html'; }

        // قراءة البيانات لايف من السيرفر
        database.ref('users/' + userCode).on('value', (snapshot) => {
            if(snapshot.exists()) {
                let data = snapshot.val();
                document.getElementById('user-name').innerText = data.username;
                document.getElementById('user-code').innerText = userCode;
                document.getElementById('user-balance').innerText = data.balance;
                
                if(data.profileImg) {
                    document.getElementById('user-image').src = data.profileImg;
                } else {
                    document.getElementById('user-image').src = "person.png";
                }
            }
        });

        function triggerFileInput() {
            document.getElementById('file-input').click();
        }

        // معالجة وتحويل الصورة المرفوعة من الهاتف وحفظها مباشرة بالسيرفر
        function handleFileSelect(event) {
            let file = event.target.files[0];
            if(!file) return;

            // التحقق من أن حجم الصورة مناسب للحفظ في قاعدة البيانات بقيمة أقل من 1.5 ميجا لضمان سرعة التحميل
            if(file.size > 1500000) {
                alert('عذراً! حجم الصورة كبير جداً، يرجى اختيار صورة بحجم أصغر للحفظ السريع.');
                return;
            }

            let reader = new FileReader();
            reader.onload = function(e) {
                let base64Image = e.target.result;
                
                // تحديث الصورة في السيرفر لايف
                database.ref('users/' + userCode).update({
                    profileImg: base64Image
                }).then(() => {
                    alert('تم بنجاح رفع وحفظ صورتك الشخصية الجديدة من الهاتف! 🎉');
                }).catch(() => {
                    alert('حدث خطأ أثناء حفظ الصورة أونلاين.');
                });
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
