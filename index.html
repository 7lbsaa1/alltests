<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7lbsaa | المنصة الرئيسية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ستايل الألوان المتناسقة والـ Glassmorphism */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: all 0.3s ease; }
        body { background: #0b0813; color: #fff; padding-top: 100px; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* الناف بار الاحترافي الزجاجي */
        .navbar { position: fixed; top: 0; left: 0; width: 100%; height: 80px; background: rgba(11, 8, 19, 0.8); display: flex; align-items: center; justify-content: space-between; padding: 0 5%; z-index: 1000; border-bottom: 1px solid rgba(0, 242, 254, 0.15); backdrop-filter: blur(12px); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4); }
        .navbar-brand img { height: 50px; width: auto; object-fit: contain; filter: drop-shadow(0 0 8px rgba(0,242,254,0.3)); }
        
        .nav-controls { display: flex; align-items: center; gap: 20px; }
        
        /* أزرار المحفظة والمستخدم الزجاجية */
        .nav-item-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 242, 254, 0.2); color: #fff; padding: 6px 14px; border-radius: 12px; text-decoration: none; display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 14px; cursor: pointer; }
        .nav-item-btn:hover { background: rgba(0, 242, 254, 0.1); border-color: #00f2fe; transform: translateY(-2px); }
        .nav-item-btn img { width: 24px; height: 24px; object-fit: contain; }
        
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #00f2fe; object-fit: cover; }

        /* شبكة عرض الفيديوهات الاحترافية */
        .main-container { flex: 1; width: 90%; max-width: 1200px; margin: 20px auto; }
        .videos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; margin-bottom: 60px; }
        .video-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; overflow: hidden; position: relative; display: flex; flex-direction: column; backdrop-filter: blur(5px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .video-card:hover { transform: translateY(-8px); border-color: rgba(0, 242, 254, 0.4); box-shadow: 0 12px 40px rgba(0,242,254,0.15); }
        
        .card-thumbnail { position: relative; aspect-ratio: 16/9; background: #000; }
        .card-thumbnail img { width: 100%; height: 100%; object-fit: cover; }
        
        /* قفل الحماية الزجاجي الفخم */
        .lock-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 8, 19, 0.75); display: flex; flex-direction: column; justify-content: center; align-items: center; color: #ff3366; font-weight: bold; font-size: 18px; gap: 12px; backdrop-filter: blur(4px); }
        .lock-overlay i { font-size: 28px; filter: drop-shadow(0 0 10px rgba(255,51,102,0.5)); }
        
        .card-content { padding: 25px; display: flex; flex-direction: column; flex-grow: 1; justify-content: space-between; }
        .card-content h3 { font-size: 16px; margin-bottom: 20px; line-height: 1.6; color: #f0f0f0; }
        
        /* أزرار الإجراءات */
        .watch-btn { background: linear-gradient(135deg, #00f2fe, #4facfe); color: #000; padding: 14px; border-radius: 14px; text-decoration: none; text-align: center; font-weight: bold; display: block; box-shadow: 0 4px 15px rgba(0,242,254,0.3); }
        .watch-btn:hover { filter: brightness(1.1); box-shadow: 0 6px 20px rgba(0,242,254,0.5); }
        .buy-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #ff3366, #ff5e62); color: #fff; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; font-size: 15px; box-shadow: 0 4px 15px rgba(255,51,102,0.3); }
        .buy-btn:hover { filter: brightness(1.1); box-shadow: 0 6px 20px rgba(255,51,102,0.5); }

        /* الفوتر (Footer) الاحترافي الزجاجي */
        footer { background: rgba(15, 12, 27, 0.9); border-top: 1px solid rgba(0, 242, 254, 0.15); padding: 30px 20px; text-align: center; backdrop-filter: blur(10px); margin-top: auto; }
        .footer-content { max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .footer-logo img { height: 40px; margin-bottom: 5px; }
        .social-links { display: flex; gap: 20px; margin: 10px 0; }
        .social-icon { width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; color: #fff; text-decoration: none; font-size: 20px; }
        .social-icon.fb:hover { color: #1877f2; background: rgba(24, 119, 242, 0.1); border-color: #1877f2; }
        .social-icon.tiktok:hover { color: #ff0050; background: rgba(255, 0, 80, 0.1); border-color: #ff0050; }
        .social-icon.x-twitter:hover { color: #00f2fe; background: rgba(0, 242, 254, 0.1); border-color: #00f2fe; }
        
        .contact-btn { background: transparent; border: 1px solid #00f2fe; color: #00f2fe; padding: 8px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 14px; margin-top: 5px; display: inline-flex; align-items: center; gap: 8px; }
        .contact-btn:hover { background: #00f2fe; color: #000; box-shadow: 0 0 15px rgba(0,242,254,0.4); }
        .copy-text { font-size: 13px; color: #666; margin-top: 10px; }

        /* سيكشن اتصل بنا الإضافي المدمج كإطار خارجي */
        .contact-section-iframe { display: none; position: fixed; top: 10%; left: 5%; width: 90%; height: 80%; background: #0f0c1b; border: 2px solid #00f2fe; border-radius: 20px; z-index: 2000; box-shadow: 0 0 50px rgba(0,0,0,0.8); overflow: hidden; }
        .close-iframe-btn { position: absolute; top: 15px; left: 15px; background: #ff3366; color: #fff; border: none; padding: 8px 16px; border-radius: 10px; font-weight: bold; cursor: pointer; z-index: 2001; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand">
            <img src="toplogo.png" onerror="this.src='toplogo.jpg'" alt="7lbsaa Logo">
        </div>
        <div class="nav-controls">
            <a href="wallet.html" class="nav-item-btn">
                <img src="wallet.png" alt="Wallet">
                <span>المحفظة</span>
            </a>
            <div class="nav-item-btn">
                <img src="money.png" alt="Money">
                <span id="nav-balance">0</span> <span>ج.م</span>
            </div>
            <a href="profile.html" class="nav-item-btn">
                <img id="nav-user-avatar" src="person.png" class="user-avatar" alt="Profile">
                <span id="nav-username">تحميل...</span>
            </a>
        </div>
    </nav>

    <main class="main-container">
        <div class="videos-grid">
            <div class="video-card">
                <div class="card-thumbnail">
                    <img src="takhrog.jpg" onerror="this.src='logox.jpg'">
                    <div class="lock-overlay" id="lock-takhrog"><i class="fas fa-lock"></i> 100 جنيه</div>
                </div>
                <div class="card-content">
                    <h3>أغنية تخرج دفعة 2019 طب قصر العيني جامعة القاهرة</h3>
                    <div id="action-takhrog"><button class="buy-btn" onclick="buyVideo('takhrog', 100)">شراء المقطع بقيمة 100 ج.م</button></div>
                </div>
            </div>

            <div class="video-card">
                <div class="card-thumbnail">
                    <img src="logox.jpg">
                    <div class="lock-overlay" id="lock-khatamna"><i class="fas fa-lock"></i> 120 جنيه</div>
                </div>
                <div class="card-content">
                    <h3>أنشودة ختمنا الطريق (إهداء لطلاب ثانوية عامة ٢٠٢٥)</h3>
                    <div id="action-khatamna"><button class="buy-btn" onclick="buyVideo('khatamna', 120)">شراء المقطع بقيمة 120 ج.م</button></div>
                </div>
            </div>
        </div>
    </main>

    <div id="contact-iframe-container" class="contact-section-iframe">
        <button class="close-iframe-btn" onclick="closeContactSection()">إغلاق ✕</button>
        <iframe src="https://7lbsaa1.github.io/7lbsaa.contact-us/" style="width:100%; height:100%; border:none;"></iframe>
    </div>

    <footer>
        <div class="footer-content">
            <div class="footer-logo">
                <img src="toplogo.png" onerror="this.src='toplogo.jpg'" alt="7lbsaa Logo">
            </div>
            
            <div class="social-links">
                <a href="https://www.facebook.com/profile.php?id=61584178882412&locale=ar_AR" target="_blank" class="social-icon fb"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.tiktok.com/@7lbsaa1" target="_blank" class="social-icon tiktok"><i class="fab fa-tiktok"></i></a>
                <a href="https://x.com/7lbsaa1" target="_blank" class="social-icon x-twitter"><i class="fab fa-x-twitter"></i></a>
            </div>

            <button class="contact-btn" onclick="openContactSection()"><i class="fas fa-envelope"></i> تواصل معنا (اتصل بنا)</button>
            
            <p class="copy-text">جميع الحقوق محفوظة © 2026 لمنصة 7lbsaa | تم التطوير بواسطة عمر و عماد</p>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSy" + "D" + "vG" + "X" + "qS" + "4M3" + "pI" + "oD" + "xK" + "Mv" + "uQ" + "y9" + "w1" + "z0" + "6Y" + "vG" + "1_8",
            authDomain: "admin-37e09.firebaseapp.com",
            databaseURL: "https://admin-37e09-default-rtdb.firebaseio.com/",
            projectId: "admin-37e09",
            storageBucket: "admin-37e09.appspot.com",
            appId: "1:782163910543:web:6b9fcd6113b28b75e2f75d"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let userCode = localStorage.getItem('currentUserCode');
        if(!userCode) { window.location.href = 'login.html'; }

        let globalUserData;

        // القراءة المباشرة أونلاين
        database.ref('users/' + userCode).on('value', (snapshot) => {
            if(snapshot.exists()) {
                globalUserData = snapshot.val();
                document.getElementById('nav-username').innerText = globalUserData.username;
                document.getElementById('nav-balance').innerText = globalUserData.balance;

                // التحقق من وجود صورة شخصية مخصصة مرفوعة في قاعدة البيانات، وإلا توضع الصورة الافتراضية person.png
                if(globalUserData.profileImg) {
                    document.getElementById('nav-user-avatar').src = globalUserData.profileImg;
                } else {
                    document.getElementById('nav-user-avatar').src = "person.png";
                }

                let purchased = globalUserData.purchasedVideos || [];
                if(purchased.includes('takhrog')) {
                    document.getElementById('lock-takhrog').style.display = 'none';
                    document.getElementById('action-takhrog').innerHTML = `<a href="takhrog-player.html" class="watch-btn"><i class="fas fa-play"></i> مشاهدة الآن</a>`;
                }
                if(purchased.includes('khatamna')) {
                    document.getElementById('lock-khatamna').style.display = 'none';
                    document.getElementById('action-khatamna').innerHTML = `<a href="khatamna-player.html" class="watch-btn"><i class="fas fa-play"></i> مشاهدة الآن</a>`;
                }
            } else {
                localStorage.removeItem('currentUserCode');
                window.location.href = 'login.html';
            }
        });

        function buyVideo(videoKey, price) {
            if(!globalUserData) return;
            if(globalUserData.balance >= price) {
                let newBalance = globalUserData.balance - price;
                let purchased = globalUserData.purchasedVideos || [];
                if(!purchased.includes(videoKey)) purchased.push(videoKey);

                database.ref('users/' + userCode).update({
                    balance: newBalance,
                    purchasedVideos: purchased
                }).then(() => alert('تم الشراء بنجاح!'));
            } else {
                alert('رصيدك لا يكفي لشراء المقطع، يرجى الشحن أولاً.');
            }
        }

        // دوال فتح وإغلاق سيكشن اتصل بنا كشاشة مدمجة
        function openContactSection() {
            document.getElementById('contact-iframe-container').style.display = 'block';
        }
        function closeContactSection() {
            document.getElementById('contact-iframe-container').style.display = 'none';
        }
    </script>
</body>
</html>
