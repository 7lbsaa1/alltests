<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7lbsaa Videos | منصة الفيديوهات</title>
    <link rel="icon" type="image/jpeg" href="logox.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: all 0.3s ease; }
        body {
            background: linear-gradient(rgba(15, 12, 27, 0.75), rgba(15, 12, 27, 0.85)), url('koko1.jpg') no-repeat center center fixed;
            background-size: cover; min-height: 100vh; color: #ffffff; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px;
        }
        .top-right-logo { position: absolute; top: 20px; right: 20px; z-index: 10; }
        .top-right-logo img { width: 70px; height: 70px; object-fit: cover; border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.2); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); }
        .main-header { margin-top: 100px; margin-bottom: 50px; text-align: center; }
        .main-header h1 { font-size: 36px; font-weight: 800; background: linear-gradient(45deg, #ffffff, #00f2fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .main-header p { color: #b3b3b3; font-size: 16px; }
        .videos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; width: 90%; max-width: 1000px; }
        .video-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; }
        .video-card:hover { transform: translateY(-10px); border-color: #00f2fe; box-shadow: 0 20px 40px rgba(0, 242, 254, 0.2); }
        .card-thumbnail { position: relative; width: 100%; aspect-ratio: 16 / 9; overflow: hidden; }
        .card-thumbnail img { width: 100%; height: 100%; object-fit: cover; }
        .card-content { padding: 22px; display: flex; flex-direction: column; flex-grow: 1; justify-content: space-between; }
        .card-title { font-size: 19px; font-weight: 700; margin-bottom: 20px; }
        .watch-btn { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); color: #ffffff; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .watch-btn:hover { background: #00f2fe; color: #0f0c1b; font-weight: 700; box-shadow: 0 0 20px rgba(0, 242, 254, 0.4); }
    </style>
</head>
<body>
    <div class="top-right-logo"><img src="toplogo.jpg" alt="Logo"></div>
    <header class="main-header">
        <h1>مكتبة فيديوهات 7lbsaa</h1>
        <p>اختر الفيديو ليفتح لك في صفحة المشغل الاحترافية الخاصة به</p>
    </header>
    <main class="videos-grid">
        <div class="video-card">
            <div class="card-thumbnail"><img src="takhrog.jpg" alt="فيديو التخرج"></div>
            <div class="card-content">
                <h3 class="card-title">أغنية تخرج دفعة 2019 طب قصر العيني جامعة القاهرة</h3>
                <a href="takhrog-player.html" class="watch-btn"><i class="fas fa-eye"></i> مشاهدة الفيديو</a>
            </div>
        </div>
        <div class="video-card">
            <div class="card-thumbnail"><img src="triplz.jpg" alt="فيديو تريلز"></div>
            <div class="card-content">
                <h3 class="card-title">فيديو تريلز (المقاطع الترويجية الرسمية)</h3>
                <a href="triplz-player.html" class="watch-btn"><i class="fas fa-eye"></i> مشاهدة الفيديو</a>
            </div>
        </div>
    </main>
</body>
</html>
