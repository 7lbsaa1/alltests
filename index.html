<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية | منصة 7lbsaa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* المتغيرات للألوان الاحترافية */
        :root {
            --bg-gradient: linear-gradient(135deg, #0b0813 0%, #1a1636 100%);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(0, 242, 254, 0.2);
            --text-main: #ffffff;
            --text-sub: #b1afcd;
            --primary: #00f2fe;
            --secondary: #ff3366;
            --footer-bg: rgba(5, 4, 10, 0.9);
        }

        [data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --card-border: rgba(0, 123, 255, 0.2);
            --text-main: #1a1d23;
            --text-sub: #6c757d;
            --primary: #0d6efd;
            --secondary: #d63384;
            --footer-bg: rgba(255, 255, 255, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: all 0.3s ease; }
        body { background: var(--bg-gradient); color: var(--text-main); min-height: 100vh; position: relative; padding-bottom: 100px; overflow-x: hidden; }

        /* الهيدر العلوي - المحفظة والملف الشخصي */
        .top-navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: rgba(0,0,0,0.2); backdrop-filter: blur(10px); border-bottom: 1px solid var(--card-border); }
        .nav-tools { display: flex; gap: 15px; align-items: center; }
        
        .top-card { display: flex; align-items: center; gap: 10px; background: var(--card-bg); border: 1px solid var(--card-border); padding: 8px 15px; border-radius: 12px; text-decoration: none; color: var(--text-main); font-weight: 600; font-size: 14px; }
        .top-card:hover { transform: translateY(-2px); border-color: var(--primary); }
        .top-card img { width: 28px; height: 28px; object-fit: contain; }

        /* المحتوى الرئيسي */
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        .welcome-text { text-align: center; margin-bottom: 50px; }
        .welcome-text h1 { font-size: 38px; font-weight: 800; margin-bottom: 10px; }
        .welcome-text h1 span { color: var(--primary); }
        
        /* الرصيد */
        .balance-bar { background: var(--card-bg); border: 1px dashed var(--primary); border-radius: 20px; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .balance-amount { font-size: 28px; font-weight: bold; color: var(--primary); font-family: monospace; }

        /* شبكة الفيديوهات - مقسمة جنب بعض */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 30px; }
        .video-item { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 24px; overflow: hidden; position: relative; }
        .video-item:hover { transform: translateY(-5px); border-color: var(--secondary); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        .thumb-area { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; }
        .thumb-area img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .play-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; font-size: 50px; color: var(--primary); cursor: pointer; }

        .item-info { padding: 20px; text-align: right; }
        .item-info h3 { font-size: 18px; margin-bottom: 15px; min-height: 48px; }
        .watch-btn { width: 100%; padding: 12px; background: var(--primary); color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .watch-btn:hover { filter: brightness(1.1); box-shadow: 0 5px 15px rgba(0,242,254,0.3); }

        /* سيكشن المشاهدة الجديد (Section/Overlay) */
        .video-overlay-section { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; backdrop-filter: blur(15px); }
        .player-container { width: 90%; max-width: 900px; aspect-ratio: 16/9; background: #000; border-radius: 20px; overflow: hidden; border: 2px solid var(--primary); position: relative; }
        .close-player { position: absolute; top: -50px; left: 0; color: #fff; font-size: 30px; cursor: pointer; }

        /* الفوتر المحدث */
        footer { background: var(--footer-bg); border-top: 1px solid var(--card-border); text-align: center; padding: 30px; position: absolute; bottom: 0; width: 100%; }
        footer p { font-size: 14px; color: var(--text-sub); }
        footer p b { color: var(--primary); }

        /* الشات العائم */
        .chat-btn { position: fixed; bottom: 25px; left: 25px; width: 60px; height: 60px; border-radius: 50%; background: var(--primary); color: #000; border: none; font-size: 24px; cursor: pointer; box-shadow: 0 5px 20px rgba(0,242,254,0.4); z-index: 999; }
    </style>
</head>
<body data-theme="dark">

    <nav class="top-navbar">
        <div class="nav-tools">
            <a href="profile.html" class="top-card">
                <img src="person.png" alt="Profile">
                <span>الملف الشخصي</span>
            </a>
            <a href="wallet.html" class="top-card">
                <img src="wallet.png" alt="Wallet">
                <span>المحفظة الرقمية</span>
            </a>
        </div>
        <button onclick="toggleTheme()" class="top-card" style="cursor: pointer;">
            <i class="fas fa-adjust"></i>
            <span>الوضع الليلي/النهاري</span>
        </button>
    </nav>

    <div class="container">
        <div class="welcome-text">
            <h1>منصة <span>7lbsaa</span> التعليمية</h1>
            <p>أهلاً بك يا بطل في مكتبة محاضراتك المجمعة</p>
        </div>

        <div class="balance-bar">
            <span style="color: var(--text-sub);"><i class="fas fa-wallet"></i> رصيدك الحالي في السيرفر:</span>
            <span class="balance-amount" id="user-balance">0.00 ج.م</span>
        </div>

        <div class="video-grid">
            <div class="video-item">
                <div class="thumb-area">
                    <img src="takhrog.jpg" onerror="this.src='logox.jpg'">
                    <div class="play-overlay" onclick="openPlayer('takhrog-player.html')"><i class="fas fa-play-circle"></i></div>
                </div>
                <div class="item-info">
                    <h3>فيديو احتفالية تخرج دفعة الثانوية العامة 🎓</h3>
                    <button class="watch-btn" onclick="openPlayer('takhrog-player.html')">
                        <i class="fas fa-tv"></i> مشاهدة الآن كـ سيكشن جديد
                    </button>
                </div>
            </div>

            <div class="video-item">
                <div class="thumb-area">
                    <img src="logox.jpg">
                    <div class="play-overlay" onclick="openPlayer('khatamna-player.html')"><i class="fas fa-play-circle"></i></div>
                </div>
                <div class="item-info">
                    <h3>أنشودة "ختمنا الطريق" الرسمية للمنصة 🎵</h3>
                    <button class="watch-btn" onclick="openPlayer('khatamna-player.html')">
                        <i class="fas fa-tv"></i> مشاهدة الآن كـ سيكشن جديد
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="videoSection" class="video-overlay-section">
        <div class="player-container">
            <div class="close-player" onclick="closePlayer()">إغلاق ✕</div>
            <iframe id="mainPlayer" src="" style="width: 100%; height: 100%; border: none;" allowfullscreen></iframe>
        </div>
    </div>

    <button class="chat-btn" onclick="window.location.href='#'"><i class="fas fa-comments"></i></button>

    <footer>
        <p>جميع الحقوق محفوظة © 2026 لـ منصة <b>7lbsaa</b> | تم التطوير بواسطة <b>7lbsaa</b></p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        // إعدادات الفايربيز
        const firebaseConfig = {
            apiKey: "AIzaSy" + "D" + "vG" + "X" + "qS" + "4M3" + "pI" + "oD" + "xK" + "Mv" + "uQ" + "y9" + "w1" + "z0" + "6Y" + "vG" + "1_8",
            authDomain: "admin-37e09.firebaseapp.com",
            databaseURL: "https://admin-37e09-default-rtdb.firebaseio.com/",
            projectId: "admin-37e09",
            storageBucket: "admin-37e09.appspot.com",
            appId: "1:782163910543:web:6b9fcd6113b28b75e2f75d"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let userCode = localStorage.getItem('currentUserCode') || '7L-STUDENT';

        // جلب الرصيد لايف
        database.ref('users/' + userCode).on('value', (s) => {
            if(s.exists()) {
                document.getElementById('user-balance').innerText = (parseFloat(s.val().balance) || 0).toFixed(2) + " ج.م";
            }
        });

        // وظائف سيكشن المشاهدة
        function openPlayer(file) {
            document.getElementById('mainPlayer').src = file;
            document.getElementById('videoSection').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // منع التمرير في الخلفية
        }

        function closePlayer() {
            document.getElementById('videoSection').style.display = 'none';
            document.getElementById('mainPlayer').src = '';
            document.body.style.overflow = 'auto';
        }

        // تبديل الثيم
        function toggleTheme() {
            const body = document.body;
            const current = body.getAttribute('data-theme');
            body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        }
    </script>
</body>
</html>
