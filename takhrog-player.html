<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark-mode">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل فيديو التخرج | 7lbsaa</title>
    <link rel="icon" type="image/jpeg" href="logox.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* الستايل الزجاجي الاحترافي الخاص بموقعك */
        :root { --bg-gradient: linear-gradient(135deg, #0f0c1b, #201a30, #0f0c1b); --panel-bg: rgba(255, 255, 255, 0.06); --panel-border: rgba(255, 255, 255, 0.1); --text-main: #ffffff; --accent-color: #00f2fe; --accent-glow: rgba(0, 242, 254, 0.4); --control-btn-bg: rgba(255, 255, 255, 0.1); }
        body { background: var(--bg-gradient); display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; color: #fff; overflow: hidden; user-select: none; -webkit-user-select: none; }
        .back-btn { position: absolute; top: 20px; right: 20px; background: var(--panel-bg); border: 1px solid var(--panel-border); color: #fff; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 8px; z-index: 30; }
        .back-btn:hover { background: var(--accent-color); color: #000; }
        .video-title { font-size: 22px; font-weight: 800; margin-bottom: 20px; text-align: center; background: linear-gradient(45deg, #fff, var(--accent-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .player-container { position: relative; width: 90%; max-width: 850px; aspect-ratio: 16 / 9; background: #000; border-radius: 20px; overflow: hidden; border: 1px solid var(--panel-border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .player-container.hide-controls { cursor: none; }
        
        .video-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        #my-html5-player { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        
        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: pointer; }
        .custom-poster-cover { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); z-index: 15; display: flex; justify-content: center; align-items: center; transition: opacity 0.3s; }
        .custom-poster-cover.video-started { opacity: 0; visibility: hidden; pointer-events: none; }
        .play-image-trigger { width: 80px; height: 80px; cursor: pointer; }
        .custom-controls { position: absolute; bottom: 0; left: 0; width: 100%; height: 65px; background: var(--panel-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--panel-border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 20; transition: all 0.3s; }
        .player-container.hide-controls .custom-controls { opacity: 0; transform: translateY(15px); pointer-events: none; }
        .controls-right, .controls-left { display: flex; align-items: center; gap: 10px; }
        .volume-container { display: flex; align-items: center; gap: 5px; position: relative; }
        .volume-slider-wrapper { width: 0px; overflow: hidden; transition: width 0.3s; display: flex; align-items: center; height: 20px; direction: ltr!important; }
        .volume-container:hover .volume-slider-wrapper, .volume-container.active .volume-slider-wrapper { width: 70px; margin-left: 5px; }
        .volume-slider { width: 100%; height: 5px; background: var(--control-btn-bg); border-radius: 5px; cursor: pointer; position: relative; }
        .volume-filled { height: 100%; background: var(--accent-color); width: 100%; border-radius: 5px; }
        .control-btn { background: var(--control-btn-bg); border: 1px solid var(--panel-border); color: var(--text-main); font-size: 14px; width: 38px; height: 38px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .control-btn:hover { background: var(--accent-color); color: #000; box-shadow: 0 0 15px var(--accent-glow); }
        .progress-container { flex-grow: 1; margin: 0 15px; display: flex; align-items: center; position: relative; cursor: pointer; height: 20px; direction: ltr!important; }
        .progress-bar { width: 100%; height: 5px; background: var(--control-btn-bg); border-radius: 10px; position: relative; }
        .progress-filled { height: 100%; background: var(--accent-color); width: 0%; border-radius: 10px; }
        .dropdown-menu-panel { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); background: rgba(15, 12, 27, 0.95); border: 1px solid var(--panel-border); border-radius: 8px; display: none; flex-direction: column; padding: 5px; z-index: 100; backdrop-filter: blur(10px); min-width: 95px; }
        .dropdown-menu-panel button { background: none; border: none; color: #fff; padding: 6px 10px; cursor: pointer; font-size: 12px; text-align: center; border-radius: 4px; width: 100%; }
        .dropdown-menu-panel button:hover { background: var(--accent-color); color: #000; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i> العودة للمكتبة</a>
    <div class="video-title">أغنية تخرج دفعة 2019 طب قصر العيني جامعة القاهرة</div>
    
    <div class="player-container" id="main-player-container" oncontextmenu="return false;">
        <div class="custom-poster-cover" id="custom-poster">
            <img src="play.png" alt="Play" class="play-image-trigger" id="img-start-trigger" />
        </div>
        <div class="video-overlay" id="vid-mask"></div>
        
        <div class="video-wrapper">
            <video id="my-html5-player" controlsList="nodownload" playsinline oncontextmenu="return false;">
                <source id="video-source" src="" type="video/mp4">
            </video>
        </div>
        
        <div class="custom-controls" id="controls-panel">
            <div class="controls-right">
                <button class="control-btn" id="play-pause-btn"><i class="fas fa-play"></i></button>
                <div class="volume-container" id="vol-zone">
                    <button class="control-btn" id="mute-btn"><i class="fas fa-volume-up"></i></button>
                    <div class="volume-slider-wrapper">
                        <div class="volume-slider" id="volume-timeline">
                            <div class="volume-filled" id="volume-current"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="progress-container" id="progress-timeline">
                <div class="progress-bar">
                    <div class="progress-filled" id="progress-current"></div>
                </div>
            </div>
            <div class="controls-left">
                <button class="control-btn" id="fullscreen-btn"><i class="fas fa-expand"></i></button>
            </div>
        </div>
    </div>

    <script>
        // 1. فحص الأمان الخاص بك (متروك كما هو)
        let currentUser = JSON.parse(localStorage.getItem('currentUser'));
        const videoId = window.location.pathname.split('/').pop().replace('-player.html', '');
        const isAllowedLocally = sessionStorage.getItem('allow_' + videoId);

        if (!isAllowedLocally && (!currentUser || !currentUser.purchasedVideos || !currentUser.purchasedVideos.includes(videoId))) { 
            alert('❌ عذراً! لم تقم بشراء هذا المقطع بعد أو غير مسموح لك بالفتح المباشر!'); 
            window.location.href = 'index.html'; 
        }

        // ==========================================
        // إعدادات التحكم في مشغل الـ HTML5 الجديد
        // ==========================================
        let isMuted = false;
        let controlsTimeout;
        let lastTap = 0; 

        const html5Player = document.getElementById('my-html5-player'); 
        const mainContainer = document.getElementById('main-player-container');
        const customPoster = document.getElementById('custom-poster');
        const vidMask = document.getElementById('vid-mask');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const muteBtn = document.getElementById('mute-btn');
        const progressTimeline = document.getElementById('progress-timeline');
        const progressCurrent = document.getElementById('progress-current');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const volumeTimeline = document.getElementById('volume-timeline');
        const volumeCurrent = document.getElementById('volume-current');
        const controlsLeft = document.querySelector('.controls-left');

        // دالة شحن وتحديث رابط الفيديو
        function loadFirebaseVideo(firebaseVideoUrl) {
            const videoSource = document.getElementById('video-source');
            videoSource.src = firebaseVideoUrl;
            html5Player.load(); 
        }

        // العداد الذي يحدث شريط التقدم أثناء تشغيل الفيديو
        html5Player.addEventListener('loadedmetadata', () => {
            setInterval(updateProgress, 200);
        });

        // إنشاء قائمة السرعات الاحترافية الخاصة بك ديناميكياً
        const speedBtn = document.createElement('button');
        speedBtn.className = 'control-btn';
        speedBtn.innerHTML = '<i class="fas fa-gauge-high"></i>';
        speedBtn.style.position = 'relative';
        const speedMenu = document.createElement('div');
        speedMenu.className = 'dropdown-menu-panel';
        [0.5, 1, 1.5, 2].forEach(speed => {
            const opt = document.createElement('button');
            opt.innerText = speed === 1 ? 'عادي' : speed + 'x';
            opt.onclick = (e) => { 
                e.stopPropagation(); 
                html5Player.playbackRate = speed; 
                speedMenu.style.display = 'none'; 
            };
            speedMenu.appendChild(opt);
        });
        speedBtn.appendChild(speedMenu);
        speedBtn.onclick = (e) => { 
            e.stopPropagation(); 
            speedMenu.style.display = speedMenu.style.display === 'flex' ? 'none' : 'flex'; 
        };
        controlsLeft.insertBefore(speedBtn, fullscreenBtn);

        document.addEventListener('click', () => { speedMenu.style.display = 'none'; });

        // تشغيل الفيديو عند الضغط على غطاء البوستر
        document.getElementById('img-start-trigger').addEventListener('click', () => {
            customPoster.classList.add('video-started');
            html5Player.play();
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        });

        playPauseBtn.addEventListener('click', togglePlay);
        vidMask.addEventListener('click', togglePlay);

        function togglePlay() {
            if (html5Player.paused) { 
                customPoster.classList.add('video-started'); 
                html5Player.play(); 
                playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            } else { 
                html5Player.pause(); 
                playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
            }
        }

        function updateProgress() {
            if (html5Player.duration > 0) {
                progressCurrent.style.width = ((html5Player.currentTime / html5Player.duration) * 100) + '%';
            }
        }

        progressTimeline.addEventListener('click', (e) => {
            const rect = progressTimeline.getBoundingClientRect();
            const duration = html5Player.duration;
            if (duration > 0) { 
                html5Player.currentTime = duration * ((e.clientX - rect.left) / rect.width); 
            }
        });

        muteBtn.addEventListener('click', () => {
            if (isMuted) { 
                html5Player.muted = false; 
                muteBtn.innerHTML = '<i class="fas fa-volume-up"></i>'; 
                volumeCurrent.style.width = '100%'; 
            } else { 
                html5Player.muted = true; 
                muteBtn.innerHTML = '<i class="fas fa-volume-xmark"></i>'; 
                volumeCurrent.style.width = '0%'; 
            }
            isMuted = !isMuted;
        });

        function setVolumeFromEvent(e) {
            const rect = volumeTimeline.getBoundingClientRect();
            let percentage = (e.clientX - rect.left) / rect.width;
            percentage = Math.max(0, Math.min(1, percentage));
            html5Player.volume = percentage; 
            volumeCurrent.style.width = (percentage * 100) + '%';
        }
        volumeTimeline.addEventListener('click', setVolumeFromEvent);

        vidMask.addEventListener('click', (e) => {
            const currentTime = new Date().getTime();
            if ((currentTime - lastTap) < 300 && (currentTime - lastTap) > 0) { toggleFullscreen(); e.preventDefault(); }
            lastTap = currentTime;
        });
        fullscreenBtn.addEventListener('click', toggleFullscreen);

        function toggleFullscreen() { 
            if (!document.fullscreenElement) { 
                mainContainer.requestFullscreen(); 
            } else { 
                document.exitFullscreen(); 
            } 
        }

        function showControls() {
            mainContainer.classList.remove('hide-controls');
            clearTimeout(controlsTimeout);
            controlsTimeout = setTimeout(() => { 
                if (!html5Player.paused) mainContainer.classList.add('hide-controls'); 
            }, 3000); 
        }
        mainContainer.addEventListener('mousemove', showControls);
        mainContainer.addEventListener('touchstart', showControls);

        // ==========================================
        // تشغيل الرابط التجريبي المباشر (تأكيد التشغيل)
        // ==========================================
        // هذا رابط فيديو حقيقي ومباشر بصيغة mp4 لتجربة المشغل والتأكد من أنه يعمل فوراً
        const currentFirebaseVideoUrl = "https://www.w3schools.com/html/mov_bbb.mp4";
        
        // شحن المشغل بالرابط وتشغيله
        loadFirebaseVideo(currentFirebaseVideoUrl);

        // حماية إضافية ضد محاولات فتح الـ Inspect بالاختصارات
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'C' || e.key === 'J')) || 
                (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
                return false;
            }
        });
        mainContainer.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
