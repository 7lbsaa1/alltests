<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غرف الدعم المباشر | 7lbsaa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #000330; color: #fff; padding: 20px; height: 100vh; display: flex; flex-direction: column; }
        .chat-container { display: flex; width: 100%; max-width: 1100px; margin: auto; height: 85vh; background: #000675; border-radius: 20px; border: 1px solid rgba(0,164,255,0.2); overflow: hidden; }
        .chat-sidebar { width: 30%; background: #00021a; border-left: 1px solid rgba(0,164,255,0.1); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .chat-main { width: 70%; display: flex; flex-direction: column; background: rgba(0,0,0,0.2); }
        .student-tab { padding: 12px; background: rgba(255,255,255,0.02); border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; border-right: 4px solid #444; }
        .student-tab.active { background: rgba(0, 164, 255, 0.1); border-color: #00a4ff; }
        .student-tab img { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #00a4ff; }
        .msg-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg-in { background: rgba(0, 164, 255, 0.1); border: 1px solid rgba(0,164,255,0.15); padding: 10px 14px; border-radius: 14px 14px 0 14px; align-self: flex-start; max-width: 75%; }
        .msg-out { background: rgba(255, 51, 102, 0.15); border: 1px solid rgba(255,51,102,0.2); padding: 10px 14px; border-radius: 14px 14px 14px 0; align-self: flex-end; max-width: 75%; }
        .footer-form { padding: 15px; background: #00021a; display: flex; gap: 10px; }
        .chat-input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid rgba(0,164,255,0.2); background: #000; color: #fff; }
        .send-btn { padding: 0 25px; background: #00a4ff; border: none; color: #000; font-weight: bold; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-sidebar" id="rooms-box">جاري تحميل المحادثات...</div>
        <div class="chat-main">
            <div class="msg-area" id="msg-display-box">
                <div style="color:#555; text-align:center; padding-top:100px;">اختر طالب من اليمين لمشاهدة رسايله لايف</div>
            </div>
            <div class="footer-form">
                <input type="text" id="admin-input" class="chat-input" placeholder="اكتب الرد للأدمن...">
                <button class="send-btn" onclick="sendReply()">إرسال</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://admin-37e09-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let activeCode = '', usersCache = {};

        database.ref('users').on('value', (s) => { if(s.exists()) usersCache = s.val(); });

        database.ref('chats').on('value', (snapshot) => {
            let box = document.getElementById('rooms-box'); box.innerHTML = '';
            if(snapshot.exists()) {
                snapshot.forEach((child) => {
                    let code = child.key;
                    let uData = usersCache[code] || { username: code, profile_pic: 'person.png' };
                    let act = code === activeCode ? 'active' : '';
                    box.innerHTML += `<div class="student-tab ${act}" onclick="openRoom('${code}')">
                        <img src="${uData.profile_pic || 'person.png'}">
                        <div><div style="font-weight:bold;">${uData.username}</div><small style="color:#00a4ff;">${code}</small></div>
                    </div>`;
                });
            }
        });

        function openRoom(code) {
            if(activeCode) database.ref('chats/' + activeCode).off();
            activeCode = code;
            database.ref('chats/' + code).on('value', (snapshot) => {
                let d = document.getElementById('msg-display-box'); d.innerHTML = '';
                snapshot.forEach(c => {
                    let m = c.val(); let cls = m.sender === 'student' ? 'msg-in' : 'msg-out';
                    d.innerHTML += `<div class="${cls}"><b>${m.sender==='student'?'الطالب':'أنا'}:</b> ${m.text}</div>`;
                });
                d.scrollTop = d.scrollHeight;
            });
        }

        function sendReply() {
            let i = document.getElementById('admin-input'); let t = i.value.trim();
            if(!t || !activeCode) return;
            database.ref('chats/' + activeCode).push({ sender: 'admin', text: t });
            i.value = '';
        }
    </script>
</body>
</html>
