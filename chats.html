<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غرف الدعم المباشر | 7lbsaa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #000330; color: #fff; padding: 20px; height: 100vh; display: flex; flex-direction: column; }
        
        .back-dash { display: inline-flex; align-items: center; gap: 8px; color: #00a4ff; text-decoration: none; margin-bottom: 15px; font-weight: bold; font-size: 14px; }
        .back-dash:hover { color: #fff; }

        .chat-container { display: flex; width: 100%; max-width: 1100px; margin: auto; height: 80vh; background: #000675; border-radius: 20px; border: 1px solid rgba(0,164,255,0.2); overflow: hidden; box-shadow: 0 12px 35px rgba(0,0,0,0.4); }
        .chat-sidebar { width: 30%; background: #00021a; border-left: 1px solid rgba(0,164,255,0.1); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .chat-main { width: 70%; display: flex; flex-direction: column; background: rgba(0,0,0,0.2); }
        
        .student-tab { padding: 12px; background: rgba(255,255,255,0.02); border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; border-right: 4px solid #444; transition: all 0.2s; }
        .student-tab.active { background: rgba(0, 164, 255, 0.15); border-color: #00a4ff; }
        .student-tab img { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #00a4ff; object-fit: cover; }
        
        .msg-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: rgba(0,0,0,0.15); }
        .msg-in { background: rgba(0, 164, 255, 0.12); border: 1px solid rgba(0,164,255,0.2); padding: 12px 16px; border-radius: 14px 14px 0 14px; align-self: flex-start; max-width: 75%; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
        .msg-out { background: rgba(255, 51, 102, 0.15); border: 1px solid rgba(255,51,102,0.25); padding: 12px 16px; border-radius: 14px 14px 14px 0; align-self: flex-end; max-width: 75%; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
        
        .footer-form { padding: 15px; background: #00021a; display: flex; gap: 10px; border-top: 1px solid rgba(0,164,255,0.1); }
        .chat-input { flex: 1; padding: 14px; border-radius: 12px; border: 1px solid rgba(0,164,255,0.2); background: #000; color: #fff; font-size: 14px; }
        .chat-input:focus { outline: none; border-color: #00a4ff; box-shadow: 0 0 10px rgba(0,164,255,0.2); }
        
        .send-btn { padding: 0 30px; background: linear-gradient(135deg, #00a4ff, #007acc); border: none; color: #fff; font-weight: bold; border-radius: 12px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 6px; }
        .send-btn:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 4px 12px rgba(0,164,255,0.3); }
    </style>
</head>
<body>

    <div style="max-width: 1100px; width:100%; margin: 0 auto;">
        <a href="admin.html" class="back-dash"><i class="fas fa-arrow-right"></i> العودة للوحة التحكم الرئيسية</a>
    </div>

    <div class="chat-container">
        <div class="chat-sidebar" id="rooms-box">جاري تحميل المحادثات النشطة...</div>
        
        <div class="chat-main">
            <div class="msg-area" id="msg-display-box">
                <div style="color:#a5a1ca; text-align:center; padding-top:150px; font-weight: 600;">
                    <i class="fas fa-comments" style="font-size: 40px; color:#00a4ff; margin-bottom:15px; display:block;"></i>
                    اختر طالب من القائمة اليمنى لمشاهدة رسائله والرد عليه لايف
                </div>
            </div>
            <div class="footer-form">
                <input type="text" id="admin-input" class="chat-input" placeholder="اكتب رد الأدمن هنا المباشر..." onkeypress="if(event.key === 'Enter') sendReply()">
                <button class="send-btn" onclick="sendReply()"><i class="fas fa-paper-plane"></i> إرسال</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://admin-37e09-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        let activeCode = '';
        let usersCache = {};
        let totalMessagesCount = 0;
        let isInitialLoad = true;

        // تحديد نغمة التنبيه عند وصول رسالة جديدة
        const notificationSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-600.wav');

        // حل مشكلة حظر المتصفحات للملفات الصوتية تلقائياً
        document.addEventListener('click', () => {
            notificationSound.play().then(() => {
                notificationSound.pause();
                notificationSound.currentTime = 0;
                console.log("تم فك حظر صوت الإشعارات بنجاح!");
            }).catch(e => console.log(e));
        }, { once: true });

        // أولاً: جلب بيانات داتا الطلاب كاش لربط الصور والأسماء
        database.ref('users').on('value', (s) => { 
            if(s.exists()) usersCache = s.val(); 
        });

        // ثانياً: مراقبة فرع المحادثات لايف وتحديث القائمة
        database.ref('chats').on('value', (snapshot) => {
            let box = document.getElementById('rooms-box'); 
            box.innerHTML = '';
            let currentTotalMessages = 0;
            let lastSentMessageStudent = '';

            if(snapshot.exists()) {
                snapshot.forEach((child) => {
                    let code = child.key;
                    let messages = child.val();
                    currentTotalMessages += Object.keys(messages).length;

                    // معرفة كود آخر طالب أرسل رسالة في السيستم
                    let msgKeys = Object.keys(messages);
                    let lastMsg = messages[msgKeys[msgKeys.length - 1]];
                    if (lastMsg && lastMsg.sender === 'student') {
                        lastSentMessageStudent = code;
                    }

                    let uData = usersCache[code] || { username: code, profile_pic: 'person.png' };
                    let act = code === activeCode ? 'active' : '';
                    
                    box.innerHTML += `<div class="student-tab ${act}" id="tab-${code}" onclick="openRoom('${code}')">
                        <img src="${uData.profile_pic || 'person.png'}">
                        <div>
                            <div style="font-weight:bold;">${uData.username || 'طالب جديد'}</div>
                            <small style="color:#00a4ff; font-family: monospace;">${code}</small>
                        </div>
                    </div>`;
                });

                // تفعيل الصوت والفتح التلقائي عند وصول رسالة جديدة
                if (!isInitialLoad && currentTotalMessages > totalMessagesCount) {
                    notificationSound.play().catch(e => console.log("اضغط كليك على الصفحة لتفعيل الصوت"));
                    
                    if(lastSentMessageStudent && activeCode !== lastSentMessageStudent) {
                        openRoom(lastSentMessageStudent);
                        
                        // عمل وميض أحمر خفيف لتنبيهك بصرياً للغرفة الجديدة
                        let activeTab = document.getElementById('tab-' + lastSentMessageStudent);
                        if(activeTab) {
                            activeTab.style.background = 'rgba(255, 51, 102, 0.25)';
                            setTimeout(() => { activeTab.style.background = 'rgba(0, 164, 255, 0.15)'; }, 1500);
                        }
                    }
                }
                
                totalMessagesCount = currentTotalMessages;
                isInitialLoad = false;
            } else {
                box.innerHTML = '<div style="color:#555; text-align:center; padding:20px;">لا يوجد محادثات حالياً.</div>';
            }
        });

        // دالة فتح غرفة الشات الخاصة بطالب معين وعرض رسائله لايف
        function openRoom(code) {
            if(activeCode && activeCode !== code) {
                database.ref('chats/' + activeCode).off();
            }
            activeCode = code;

            // إعادة تمشيط الـ Active Class في الأزرار بالجانب الأيمن
            document.querySelectorAll('.student-tab').forEach(tab => tab.classList.remove('active'));
            let currentTab = document.getElementById('tab-' + code);
            if(currentTab) currentTab.classList.add('active');

            database.ref('chats/' + code).on('value', (snapshot) => {
                let d = document.getElementById('msg-display-box'); 
                d.innerHTML = '';
                
                snapshot.forEach(c => {
                    let m = c.val(); 
                    let cls = m.sender === 'student' ? 'msg-in' : 'msg-out';
                    let name = m.sender === 'student' ? 'الطالب' : 'أنا دوت الأدمن';
                    d.innerHTML += `<div class="${cls}"><b>${name}:</b> ${m.text}</div>`;
                });
                d.scrollTop = d.scrollHeight; // سحب السكرول لتحت تلقائياً
            });
        }

        // دالة إرسال رد الأدمن إلى الفايربيز
        function sendReply() {
            let i = document.getElementById('admin-input'); 
            let t = i.value.trim();
            if(!t || !activeCode) return;
            
            database.ref('chats/' + activeCode).push({ 
                sender: 'admin', 
                text: t,
                timestamp: new Date().getTime()
            });
            i.value = '';
            i.focus();
        }
    </script>
</body>
</html>
